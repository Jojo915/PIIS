<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notebook Canvas</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="search-container">
      <div class="search-wrapper">
        <button class="search-icon-btn" id="searchButton">
          <img src="../icons/search_icon.svg" alt="Search" class="search-icon-btn-icon" />
        </button>
        <input
          type="text"
          class="search-bar"
          id="searchInput"
          placeholder="Search your notebook... (e.g., 'normalize features')"
          autofocus
        />
        <button class="clear-btn" id="clearButton" style="display: none" title="Close Search">
          <img src="../icons/close_icon.svg" alt="Clear" class="close-icon" />
        </button>
      </div>
      <button
        class="back-button"
        id="backButton"
        title="Go back to previous cell"
      >
        <img src="../icons/backbutton_icon.svg" alt="Back" class="back-icon" />
      </button>
    </div>

    <div class="loading-container" id="loadingState" style="display: none">
      <div class="loading-spinner"></div>
      <p>Searching through your notebook...</p>
    </div>

    <div class="default-section" id="defaultSection">
      <h3 class="section-title">All Cells</h3>
      <div class="results-container" id="allCellsContainer"></div>
    </div>

    <div class="results-section" id="resultsSection" style="display: none">
      <div class="top-results">
        <h3 class="section-title">Top Matches</h3>
        <div class="results-container" id="topResultsContainer"></div>
      </div>
      <details class="other-results" id="otherResults" style="display: none">
        <summary class="other-results-summary">
          <img
            src="../icons/dropdown_icon.svg"
            alt="Expand"
            class="dropdown-icon"
          />
          <span>Other Cells</span>
          <span class="cell-count" id="otherCellCount">(0)</span>
        </summary>
        <div class="results-container" id="otherResultsContainer"></div>
      </details>
    </div>

    <script src="mockdata.js"></script>
    <script src="script.js"></script>
  </body>
</html>
