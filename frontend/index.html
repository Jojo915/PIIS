<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notebook Canvas</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="search-container">
      <div class="search-wrapper">
        <button class="search-icon-btn" id="searchButton">
          <img
            src="icons/search_icon.svg"
            alt="Search"
            class="search-icon-btn-icon"
          />
        </button>
        <input
          type="text"
          class="search-bar"
          id="searchInput"
          placeholder="Search your notebook... (e.g., 'normalize features')"
          autofocus
        />
        <div
          class="search-inline-options"
          id="searchInlineOptions"
          style="display: none"
        >
          <button
            class="search-option-btn"
            id="matchCaseButton"
            title="Match Case"
            aria-label="Match Case"
          >
            <span class="search-option-icon match-case-icon"></span>
          </button>
          <button
            class="search-option-btn"
            id="matchWholeWordButton"
            title="Match Whole Word"
            aria-label="Match Whole Word"
          >
            <span class="search-option-icon match-whole-word-icon"></span>
          </button>
          <button
            class="search-option-btn"
            id="useRegexButton"
            title="Use Regular Expression"
            aria-label="Use Regular Expression"
          >
            <span class="search-option-icon regex-icon"></span>
          </button>
        </div>
        <button
          class="clear-btn"
          id="clearButton"
          style="display: none"
          title="Close Search"
        >
          <img src="icons/close_icon.svg" alt="Clear" class="close-icon" />
        </button>
      </div>
    </div>

    <div class="loading-container" id="loadingState" style="display: none">
      <div class="loading-spinner"></div>
      <p>Searching through your notebook...</p>
    </div>

    <div class="search-error" id="searchErrorState" style="display: none">
      <p class="error-message" id="searchErrorMessage"></p>
    </div>

    <div class="default-section" id="defaultSection">
      <h3 class="section-title">All Code Cells</h3>
      <div class="results-container" id="allCellsContainer">
        <p class="section-title">Index your notebook to see cells here.</p>
      </div>
    </div>

    <div class="results-section" id="resultsSection" style="display: none">
      <div class="exact-matches-group">
        <h3 class="section-title">Exact Matches</h3>
        <div class="results-container" id="exactResultsContainer"></div>
      </div>

      <hr class="results-divider" />

      <div class="semantic-matches-group">
        <h3 class="section-title">Semantic Matches</h3>

        <details class="relevance-tier" id="topMatchesGroup" open>
          <summary class="relevance-tier-summary">
            <img
              src="icons/dropdown_icon.svg"
              alt="Expand"
              class="dropdown-icon"
            />
            <span>Top Matches</span>
          </summary>
          <div class="results-container" id="topResultsContainer"></div>
        </details>

        <details class="relevance-tier" id="mediumMatchesGroup" open>
          <summary class="relevance-tier-summary">
            <img
              src="icons/dropdown_icon.svg"
              alt="Expand"
              class="dropdown-icon"
            />
            <span>Medium Matches</span>
          </summary>
          <div class="results-container" id="mediumResultsContainer"></div>
        </details>

        <details class="relevance-tier" id="lowMatchesGroup" open>
          <summary class="relevance-tier-summary">
            <img
              src="icons/dropdown_icon.svg"
              alt="Expand"
              class="dropdown-icon"
            />
            <span>Low Matches</span>
          </summary>
          <div class="results-container" id="lowResultsContainer"></div>
        </details>
      </div>
    </div>

    <script src="mockdata.js"></script>
    <script src="script.js"></script>
  </body>
</html>
