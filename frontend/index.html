<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notebook Canvas</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="search-container">
      <div class="search-wrapper input-wrapper">
        <button class="search-icon-btn" id="searchButton">
          <img
            src="icons/search_icon.svg"
            alt="Search"
            class="search-icon-btn-icon icon-16"
          />
        </button>
        <textarea
          class="search-bar auto-grow-input"
          id="searchInput"
          rows="1"
          placeholder="Search..."
          autofocus
        ></textarea>
        <div class="search-trailing">
          <div class="search-opts">
            <button
              class="search-opt-btn"
              id="caseSensitiveBtn"
              title="Match Case (Alt + C)"
              aria-pressed="false"
            >
              <span class="search-opt-icon match-case-icon"></span>
            </button>
            <button
              class="search-opt-btn"
              id="wholeWordBtn"
              title="Match Whole Word (Alt + W)"
              aria-pressed="false"
            >
              <span class="search-opt-icon match-whole-word-icon"></span>
            </button>
            <button
              class="search-opt-btn"
              id="regexBtn"
              title="Use Regular Expression (Alt + R)"
              aria-pressed="false"
            >
              <span class="search-opt-icon regex-icon"></span>
            </button>
          </div>
          <span id="modeChip" class="mode-chip" style="display: none"></span>
          <button
            class="clear-btn"
            id="clearButton"
            style="display: none"
            title="Close Search"
          >
            <img
              src="icons/close_icon.svg"
              alt="Clear"
              class="close-icon icon-16"
            />
          </button>
        </div>
      </div>
    </div>

    <div class="loading-container" id="loadingState" style="display: none">
      <div class="loading-spinner"></div>
      <p>Searching through your notebook...</p>
    </div>

    <div class="default-section" id="defaultSection">
      <h3 class="section-title">All Cells</h3>
      <div class="results-container" id="allCellsContainer">
        <p class="section-title">Index your notebook to see cells here.</p>
      </div>
    </div>

    <div
      class="searching-indicator"
      id="searchingIndicator"
      style="display: none"
    >
      <div class="searching-spinner"></div>
      <span>Searching AI…</span>
    </div>

    <div class="results-section" id="resultsSection" style="display: none">
      <div class="top-results">
        <h3 class="section-title" id="topResultsSectionTitle">Top Matches</h3>

        <div class="replace-row" id="replaceRow" style="display: none">
          <div class="replace-wrapper input-wrapper">
            <textarea
              class="replace-input auto-grow-input"
              id="replaceInput"
              rows="1"
              placeholder="Replace"
            ></textarea>
            <div class="search-opts">
              <button
                class="search-opt-btn"
                id="preserveCaseButton"
                title="Preserve Case (Alt + P)"
                aria-pressed="false"
              >
                <span class="search-opt-icon preserve-case-icon"></span>
              </button>
            </div>
          </div>
          <button
            class="search-opt-btn replace-all-btn"
            id="replaceAllButton"
            title="Replace All (Ctrl + Alt + Enter)"
            aria-label="Replace All (Ctrl + Alt + Enter)"
          >
            <span class="search-opt-icon replace-all-icon"></span>
          </button>
        </div>

        <div class="results-container" id="topResultsContainer"></div>
      </div>
      <details class="other-results" id="otherResults" style="display: none">
        <summary class="other-results-summary">
          <img
            src="icons/dropdown_icon.svg"
            alt="Expand"
            class="chevron-icon icon-16"
          />
          <span>Other Cells</span>
          <span class="cell-count" id="otherCellCount">(0)</span>
        </summary>
        <div class="results-container" id="otherResultsContainer"></div>
      </details>
    </div>

    <div class="dialog-overlay" id="replaceAllOverlay" style="display: none">
      <div class="dialog-box">
        <p class="dialog-message" id="replaceAllMessage"></p>
        <div class="dialog-actions">
          <button
            class="dialog-btn dialog-btn-primary"
            id="replaceAllConfirmButton"
          >
            Replace
          </button>
          <button class="dialog-btn" id="replaceAllCancelButton">Cancel</button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
